[build_sphinx]
source-dir = doc/source
build-dir = doc/build
all_files = 1

[upload_sphinx]
upload-dir = doc/build/html

[pep8]
max-line-length = 250

[tool:pytest]
mock_use_standalone_module = true
junit_family = xunit2
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration_test: marks tests as integration (select with '-m "integration_test"')

