plugin_relays:
  # Plugin to relay dependencies mapping
  # Defines which plugins are triggered based on relay states
  # At least one 'and' or 'not' entry is required
  #
  # 'and': Plugins are activated when the specified relay IS ON
  #   Format: relay_id: plugin_name
  #   Example: When relay 2 is ON, trigger the 'Well Pump' plugin
  #
  # 'not': Plugins are activated when the specified relay IS OFF
  #   Format: relay_id: plugin_name
  #   Example: When relay 3 is OFF, trigger the 'Well Pump' plugin
  #
  # Note: A plugin can appear in both 'and' and 'not' mappings with different relays
  # A relay can only appear in one mapping type (and or not) for a given plugin

