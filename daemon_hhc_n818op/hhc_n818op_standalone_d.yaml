daemon:
  log_level: info
  pidfile: /run/hhc_n818op_d.pid
  cycle: 2
  cycle_sleeping: 300
  logfile: /var/log/daemon_hhc_n818op.log
  timezone: Europe/Paris

hhc-n818op:
  host: 10.0.30.2
  port: 5000

# Default relay configuration on startup (initialization mask)
# Format: list of relay IDs to enable (others will be disabled)
# Example: [1, 3, 5] to enable relays 1, 3 and 5
relays_default: [ 7 ]

relays_scenarios: # Date Time formats '%d/%m/%y %H:%M:%S.%f' with combinations like '%H:%M:%S.%f' or '%f', etc...
