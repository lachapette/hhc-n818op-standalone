daemon:
  log_level: info
  pidfile: /run/hhc_n818op_d.pid
  cycle: 2
  cycle_sleeping: 300
  logfile: /var/log/daemon_hhc_n818op.log
  timezone: Europe/Paris

hhc-n818op:
  host: 10.0.30.2
  port: 5000

# Default relay configuration on startup (initialization mask)
# Format: list of relay IDs to enable (others will be disabled)
# Example: [1, 3, 5] to enable relays 1, 3 and 5
relays_default: [ ]

# Periodicity configuration for mask end calculation
# Determines how long default relays stay ON after the last scenario ends
# Available strategies:
#   - end_of_day: until midnight of the same day (default)
#   - end_of_week: until end of the current week (Sunday midnight)
#   - end_of_month: until end of the current month
#   - custom_days: until a custom date/time or delta from scenario end
#     Supports flexible formats: %d/%m/%y %H:%M:%S.%f (any combination)
#     Examples:
#       - custom_days: 3                # 3 days from end
#       - custom_days: "02:00:00"        # until 2:00 AM today
#       - custom_days: "01/01/2025"      # until Jan 1, 2025
#       - custom_days: "01/01/2025 12:00:00" # until Jan 1, 2025 at noon
periodicity:
  mask_end_strategy: end_of_day
  custom_days: 1

